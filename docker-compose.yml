version: '3.9'

services:
  # ─────────────────────────────────────────────
  # PostgreSQL 15
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: sdlc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sdlc
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: sdlcdb
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdlc -d sdlcdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # NestJS API
  # ─────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: sdlc_api
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql://sdlc:secret@postgres:5432/sdlcdb
      PORT: 3000
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # React/Vite Frontend
  # ─────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: sdlc_web
    restart: unless-stopped
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:3000
    depends_on:
      - api
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
